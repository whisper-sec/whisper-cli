name: Publish MCP server

on:
  workflow_dispatch:

permissions:
  id-token: write   # GitHub OIDC → authenticates the io.github.whisper-sec/* namespace
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          ver="$(curl -fsSL https://api.github.com/repos/modelcontextprotocol/registry/releases/latest | sed -n 's/.*"tag_name": *"\([^"]*\)".*/\1/p' | head -1)"
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${ver}/mcp-publisher_linux_amd64.tar.gz" | tar xz -C "$RUNNER_TEMP" mcp-publisher
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/mcp-publisher" --version
      - name: Validate server.json
        run: mcp-publisher validate server.json
      - name: Login (GitHub Actions OIDC)
        run: mcp-publisher login github-oidc
      - name: Publish to the MCP Registry
        run: mcp-publisher publish
