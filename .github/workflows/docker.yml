name: Docker image

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp + tag (default: latest release tag)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need tags for the dispatch version fallback
      - name: Resolve version
        id: ver
        run: |
          v="${{ github.event.inputs.version }}"
          if [ -z "$v" ] && [ "${GITHUB_REF_TYPE}" = tag ]; then v="${GITHUB_REF_NAME#v}"; fi
          if [ -z "$v" ]; then v="$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')"; fi
          [ -n "$v" ] || v=dev
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building image version $v"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          # OCI annotation so the MCP Registry can verify this image belongs to the server.
          annotations: |
            io.modelcontextprotocol.server.name=io.github.whisper-sec/whisper
          tags: |
            ghcr.io/whisper-sec/whisper:latest
            ghcr.io/whisper-sec/whisper:${{ steps.ver.outputs.version }}
